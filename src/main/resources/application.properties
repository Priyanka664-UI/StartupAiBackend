spring.application.name=StartupAi
server.port=8084

spring.datasource.url=jdbc:postgresql://localhost:5433/StartupAi
spring.datasource.username=postgres
spring.datasource.password=Priyanka
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=mySecretKey
app.jwt.expiration=86400000

# External API Keys
app.openai.api-key=your_openai_api_key
app.news.api-key=your_news_api_key
app.serp.api-key=your_serp_api_key
app.github.token=your_github_token

# CORS Configuration
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000

# Google OAuth Configuration
google.client.id=your_google_client_id_here
